# Enterprise VPS Nginx Configuration
upstream jms_backend {
    # PM2 Cluster automatically binds to 3000
    server 127.0.0.1:3000 weight=1;
}

upstream jms_frontend {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name vps.jms-system.com;

    # SSL Configs (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/vps.jms-system.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vps.jms-system.com/privkey.pem;

    # GZip Compression for huge JSON sync payloads
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # Backend API Routing (Including WebSockets)
    location /api/v1/ {
        proxy_pass http://jms_backend;
        proxy_http_version 1.1;
        
        # REQUIRED FOR SOCKET.IO WEBSOCKETS TO STAY OPEN
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Increase timeouts heavily because initial Full Syncs might take a while
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Next.js Frontend Routing (App Router)
    location / {
        proxy_pass http://jms_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
