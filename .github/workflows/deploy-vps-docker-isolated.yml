# Automated deploy: JMS v1 Docker stack (BACKEND + Postgres, port 9091) on your VPS.
#
# GitHub → Settings → Secrets and variables → Actions:
#   HOSTINGER_SSH_HOST
#   HOSTINGER_SSH_USER
#   VPS_DEPLOY_PATH          (e.g. /opt/jms-enterprise)
#   VPS_POSTGRES_PASSWORD    (used as DB_PASSWORD for the v1 Postgres container)
#
# Optional:
#   VPS_SSH_PASSWORD         (or use HOSTINGER_SSH_KEY instead of password)
#   HOSTINGER_SSH_KEY
#   HOSTINGER_SSH_KEY_PASSPHRASE
#   VPS_GEMINI_API_KEY       (optional; Google AI for v1 features)

name: Deploy VPS Docker (v1)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docker-compose.vps-v1-isolated.yml"
      - "docker-compose.vps-v1-hostinger.yml"
      - "env.vps-v1.example"
      - "BACKEND/**"

concurrency:
  group: deploy-vps-docker-v1
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets
        shell: bash
        run: |
          missing=0
          for name in HOSTINGER_SSH_HOST HOSTINGER_SSH_USER VPS_DEPLOY_PATH VPS_POSTGRES_PASSWORD; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Missing or empty repository secret: $name"
              missing=1
            fi
          done
          if [ -z "$VPS_SSH_PASSWORD" ] && [ -z "$HOSTINGER_SSH_KEY" ]; then
            echo "::error::Set VPS_SSH_PASSWORD (simplest) or HOSTINGER_SSH_KEY (key auth)."
            missing=1
          fi
          exit "$missing"
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          VPS_POSTGRES_PASSWORD: ${{ secrets.VPS_POSTGRES_PASSWORD }}

      - name: Deploy over SSH (password)
        if: ${{ secrets.VPS_SSH_PASSWORD != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: 22
          command_timeout: 45m
          script_stop: true
          script: |
            set -eo pipefail
            DEPLOY_PATH='${{ secrets.VPS_DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              echo "ERROR: VPS_DEPLOY_PATH is empty"
              exit 1
            fi
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            if [ ! -d .git ]; then
              git clone https://github.com/malisanjay475/jms_enterprise.git .
            else
              git fetch origin
              git checkout main
              git pull origin main
            fi
            umask 077
            GEMINI='${{ secrets.VPS_GEMINI_API_KEY }}'
            {
              echo "DB_USER=jms_v1"
              echo "DB_PASSWORD=${{ secrets.VPS_POSTGRES_PASSWORD }}"
              echo "DB_NAME=jms_v1"
              echo "V1_HTTP_PORT=9091"
              echo "GEMINI_API_KEY=${GEMINI}"
              echo "SERVER_TYPE=MAIN"
            } > .env
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: Neither docker compose nor docker-compose is available on the VPS."
              exit 1
            fi
            $DC -p jms-enterprise-v1 -f docker-compose.vps-v1-isolated.yml up -d --build

      - name: Deploy over SSH (key)
        if: ${{ secrets.VPS_SSH_PASSWORD == '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_KEY_PASSPHRASE }}
          port: 22
          command_timeout: 45m
          script_stop: true
          script: |
            set -eo pipefail
            DEPLOY_PATH='${{ secrets.VPS_DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              echo "ERROR: VPS_DEPLOY_PATH is empty"
              exit 1
            fi
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            if [ ! -d .git ]; then
              git clone https://github.com/malisanjay475/jms_enterprise.git .
            else
              git fetch origin
              git checkout main
              git pull origin main
            fi
            umask 077
            GEMINI='${{ secrets.VPS_GEMINI_API_KEY }}'
            {
              echo "DB_USER=jms_v1"
              echo "DB_PASSWORD=${{ secrets.VPS_POSTGRES_PASSWORD }}"
              echo "DB_NAME=jms_v1"
              echo "V1_HTTP_PORT=9091"
              echo "GEMINI_API_KEY=${GEMINI}"
              echo "SERVER_TYPE=MAIN"
            } > .env
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: Neither docker compose nor docker-compose is available on the VPS."
              exit 1
            fi
            $DC -p jms-enterprise-v1 -f docker-compose.vps-v1-isolated.yml up -d --build
