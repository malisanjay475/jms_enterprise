name: Deploy VPS Docker (manual or rollback)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy, for example latest or sha-abc123def456"
        required: false
        default: latest
      deploy_branch:
        description: "Git branch to deploy on the VPS"
        required: false
        default: main

concurrency:
  group: deploy-vps-docker-v1-manual
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/jms-v1-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify required secrets
        id: gate
        shell: bash
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          USER: ${{ secrets.HOSTINGER_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DBPW: ${{ secrets.VPS_POSTGRES_PASSWORD }}
          SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$DEPLOY_PATH" ] || [ -z "$DBPW" ]; then
            echo "::error::Missing HOSTINGER_SSH_HOST, HOSTINGER_SSH_USER, VPS_DEPLOY_PATH, or VPS_POSTGRES_PASSWORD."
            exit 1
          fi
          if [ -n "$SSH_PASSWORD" ]; then
            echo "run=password" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$SSH_KEY" ]; then
            echo "run=key" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::Set VPS_SSH_PASSWORD or HOSTINGER_SSH_KEY."
          exit 1

      - name: Manual deploy over SSH (password)
        if: steps.gate.outputs.run == 'password'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch || 'main' }}
          DEPLOY_PROJECT: jms-enterprise-v1
          DEPLOY_COMPOSE_FILE: docker-compose.vps-v1-isolated.yml
          DEPLOY_ENVIRONMENT: production
          DEPLOY_GIT_SHA: manual-${{ github.run_id }}
          APP_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag || 'latest' }}
          DB_USER: jms_v1
          DB_PASSWORD: ${{ secrets.VPS_POSTGRES_PASSWORD }}
          DB_NAME: jms_v1
          V1_HTTP_PORT: ${{ secrets.V1_HTTP_PORT || '9091' }}
          GEMINI_API_KEY: ${{ secrets.VPS_GEMINI_API_KEY }}
          SERVER_TYPE: MAIN
          MAIN_SERVER_URL: ${{ secrets.MAIN_SERVER_URL }}
          LOCAL_FACTORY_ID: ${{ secrets.LOCAL_FACTORY_ID }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: 22
          command_timeout: 45m
          script_stop: true
          envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_PROJECT,DEPLOY_COMPOSE_FILE,DEPLOY_ENVIRONMENT,DEPLOY_GIT_SHA,APP_IMAGE,DB_USER,DB_PASSWORD,DB_NAME,V1_HTTP_PORT,GEMINI_API_KEY,SERVER_TYPE,MAIN_SERVER_URL,LOCAL_FACTORY_ID,SYNC_API_KEY,GHCR_PULL_TOKEN,GHCR_USERNAME,GITHUB_REPOSITORY
          script: |
            set -eo pipefail
            mkdir -p "$DEPLOY_PATH"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone "https://github.com/${GITHUB_REPOSITORY}.git" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            bash scripts/vps-safe-deploy.sh

      - name: Manual deploy over SSH (key)
        if: steps.gate.outputs.run == 'key'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch || 'main' }}
          DEPLOY_PROJECT: jms-enterprise-v1
          DEPLOY_COMPOSE_FILE: docker-compose.vps-v1-isolated.yml
          DEPLOY_ENVIRONMENT: production
          DEPLOY_GIT_SHA: manual-${{ github.run_id }}
          APP_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag || 'latest' }}
          DB_USER: jms_v1
          DB_PASSWORD: ${{ secrets.VPS_POSTGRES_PASSWORD }}
          DB_NAME: jms_v1
          V1_HTTP_PORT: ${{ secrets.V1_HTTP_PORT || '9091' }}
          GEMINI_API_KEY: ${{ secrets.VPS_GEMINI_API_KEY }}
          SERVER_TYPE: MAIN
          MAIN_SERVER_URL: ${{ secrets.MAIN_SERVER_URL }}
          LOCAL_FACTORY_ID: ${{ secrets.LOCAL_FACTORY_ID }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_KEY_PASSPHRASE }}
          port: 22
          command_timeout: 45m
          script_stop: true
          envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_PROJECT,DEPLOY_COMPOSE_FILE,DEPLOY_ENVIRONMENT,DEPLOY_GIT_SHA,APP_IMAGE,DB_USER,DB_PASSWORD,DB_NAME,V1_HTTP_PORT,GEMINI_API_KEY,SERVER_TYPE,MAIN_SERVER_URL,LOCAL_FACTORY_ID,SYNC_API_KEY,GHCR_PULL_TOKEN,GHCR_USERNAME,GITHUB_REPOSITORY
          script: |
            set -eo pipefail
            mkdir -p "$DEPLOY_PATH"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone "https://github.com/${GITHUB_REPOSITORY}.git" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            bash scripts/vps-safe-deploy.sh
