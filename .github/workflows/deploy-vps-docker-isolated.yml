# Automated deploy: isolated Docker stack (port 9080) on your VPS.
#
# GitHub → Settings → Secrets and variables → Actions:
#   HOSTINGER_SSH_HOST       (e.g. 72.62.228.195)
#   HOSTINGER_SSH_USER       (e.g. root)
#   VPS_SSH_PASSWORD         root SSH password (full automation; rotate if leaked)
#   VPS_DEPLOY_PATH          (e.g. /opt/jms-enterprise)
#   VPS_POSTGRES_PASSWORD    (DB password for isolated Postgres)
#   VPS_JWT_SECRET           (32+ chars for Nest)
#
# Optional (instead of password — do not set both at once for this workflow):
#   HOSTINGER_SSH_KEY        private key PEM
#   HOSTINGER_SSH_KEY_PASSPHRASE  if key is encrypted
#
# Security: prefer SSH keys long-term; password mode is for convenience only.

name: Deploy VPS Docker (isolated)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docker-compose.vps-isolated.yml"
      - "docker-compose.vps-hostinger.yml"
      - "docker-compose.vps-v1-hostinger.yml"
      - "docker-compose.vps-v1-isolated.yml"
      - "env.vps-isolated.example"
      - "v2-backend/**"
      - "v2-frontend/**"
      - "deploy/docker/**"

concurrency:
  group: deploy-vps-docker-isolated
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets
        shell: bash
        run: |
          missing=0
          for name in HOSTINGER_SSH_HOST HOSTINGER_SSH_USER VPS_DEPLOY_PATH VPS_POSTGRES_PASSWORD VPS_JWT_SECRET; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Missing or empty repository secret: $name"
              missing=1
            fi
          done
          if [ -z "$VPS_SSH_PASSWORD" ] && [ -z "$HOSTINGER_SSH_KEY" ]; then
            echo "::error::Set VPS_SSH_PASSWORD (simplest) or HOSTINGER_SSH_KEY (key auth)."
            missing=1
          fi
          exit "$missing"
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          VPS_POSTGRES_PASSWORD: ${{ secrets.VPS_POSTGRES_PASSWORD }}
          VPS_JWT_SECRET: ${{ secrets.VPS_JWT_SECRET }}

      - name: Deploy over SSH (password)
        if: ${{ secrets.VPS_SSH_PASSWORD != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: 22
          command_timeout: 45m
          script_stop: true
          script: |
            set -eo pipefail
            DEPLOY_PATH='${{ secrets.VPS_DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              echo "ERROR: VPS_DEPLOY_PATH is empty"
              exit 1
            fi
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            if [ ! -d .git ]; then
              git clone https://github.com/malisanjay475/jms_enterprise.git .
            else
              git fetch origin
              git checkout main
              git pull origin main
            fi
            umask 077
            printf '%s\n' \
              "POSTGRES_PASSWORD=${{ secrets.VPS_POSTGRES_PASSWORD }}" \
              "JWT_SECRET=${{ secrets.VPS_JWT_SECRET }}" \
              "REDIS_PASSWORD=" \
              "HTTP_HOST_PORT=9080" > .env
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: Neither docker compose nor docker-compose is available on the VPS."
              exit 1
            fi
            $DC -p jms-enterprise-vps -f docker-compose.vps-isolated.yml up -d --build

      - name: Deploy over SSH (key)
        if: ${{ secrets.VPS_SSH_PASSWORD == '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_KEY_PASSPHRASE }}
          port: 22
          command_timeout: 45m
          script_stop: true
          script: |
            set -eo pipefail
            DEPLOY_PATH='${{ secrets.VPS_DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              echo "ERROR: VPS_DEPLOY_PATH is empty"
              exit 1
            fi
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            if [ ! -d .git ]; then
              git clone https://github.com/malisanjay475/jms_enterprise.git .
            else
              git fetch origin
              git checkout main
              git pull origin main
            fi
            umask 077
            printf '%s\n' \
              "POSTGRES_PASSWORD=${{ secrets.VPS_POSTGRES_PASSWORD }}" \
              "JWT_SECRET=${{ secrets.VPS_JWT_SECRET }}" \
              "REDIS_PASSWORD=" \
              "HTTP_HOST_PORT=9080" > .env
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: Neither docker compose nor docker-compose is available on the VPS."
              exit 1
            fi
            $DC -p jms-enterprise-vps -f docker-compose.vps-isolated.yml up -d --build
