name: JMS v1 - validate, publish, and deploy staging

on:
  push:
    branches: [develop]
    paths:
      - "BACKEND/**"
      - "docker-compose.vps-v1-isolated.yml"
      - "docker-compose.vps-v1-hostinger.yml"
      - "scripts/vps-safe-deploy.sh"
      - ".github/workflows/deploy-v1-staging.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: jms-v1-staging
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/jms-v1-app

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jpsms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jpsms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BACKEND/package-lock.json

      - name: Install backend dependencies
        working-directory: BACKEND
        run: npm ci

      - name: Validate boot flow
        shell: bash
        working-directory: BACKEND
        run: |
          cat > .env <<'EOF'
          GEMINI_API_KEY=dummy-key
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_NAME=jpsms
          SERVER_TYPE=STANDALONE
          LOCAL_FACTORY_ID=1
          SYNC_API_KEY=staging-ci
          EOF

          node scripts/wait-for-postgres.js
          node scripts/auto-import-db-if-needed.js

          node server.js > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/health >/tmp/health.json; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:3000/health
          curl -fsS http://127.0.0.1:3000/api/health

  publish-image:
    runs-on: ubuntu-latest
    needs: validate-backend
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          image_tag="staging-${short_sha}"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: ./BACKEND
          file: ./BACKEND/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ env.IMAGE_NAME }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: publish-image
    environment: staging
    steps:
      - name: Check staging deploy secrets
        id: gate
        shell: bash
        env:
          HOST: ${{ secrets.STAGING_HOSTINGER_SSH_HOST }}
          USER: ${{ secrets.STAGING_HOSTINGER_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_VPS_DEPLOY_PATH }}
          DBPW: ${{ secrets.STAGING_VPS_POSTGRES_PASSWORD }}
          SSH_PASSWORD: ${{ secrets.STAGING_VPS_SSH_PASSWORD }}
          SSH_KEY: ${{ secrets.STAGING_HOSTINGER_SSH_KEY }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$DEPLOY_PATH" ] || [ -z "$DBPW" ]; then
            echo "run=0" >> "$GITHUB_OUTPUT"
            echo "Skipping staging deploy: set STAGING_HOSTINGER_SSH_HOST, STAGING_HOSTINGER_SSH_USER, STAGING_VPS_DEPLOY_PATH, STAGING_VPS_POSTGRES_PASSWORD."
            exit 0
          fi
          if [ -n "$SSH_PASSWORD" ]; then
            echo "run=password" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$SSH_KEY" ]; then
            echo "run=key" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run=0" >> "$GITHUB_OUTPUT"
          echo "Skipping staging deploy: set STAGING_VPS_SSH_PASSWORD or STAGING_HOSTINGER_SSH_KEY."

      - name: Deploy staging over SSH (password)
        if: steps.gate.outputs.run == 'password'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.STAGING_VPS_DEPLOY_PATH }}
          DEPLOY_BRANCH: develop
          DEPLOY_PROJECT: jms-enterprise-v1-staging
          DEPLOY_COMPOSE_FILE: docker-compose.vps-v1-isolated.yml
          DEPLOY_ENVIRONMENT: staging
          DEPLOY_GIT_SHA: ${{ github.sha }}
          APP_IMAGE: ${{ needs.publish-image.outputs.image_ref }}
          DB_USER: jms_v1
          DB_PASSWORD: ${{ secrets.STAGING_VPS_POSTGRES_PASSWORD }}
          DB_NAME: jms_v1
          V1_HTTP_PORT: ${{ secrets.STAGING_V1_HTTP_PORT || '9092' }}
          GEMINI_API_KEY: ${{ secrets.STAGING_VPS_GEMINI_API_KEY }}
          SERVER_TYPE: MAIN
          MAIN_SERVER_URL: ${{ secrets.STAGING_MAIN_SERVER_URL }}
          LOCAL_FACTORY_ID: ${{ secrets.STAGING_LOCAL_FACTORY_ID }}
          SYNC_API_KEY: ${{ secrets.STAGING_SYNC_API_KEY }}
          DB_BACKUP_BEFORE_DEPLOY: ${{ secrets.STAGING_DB_BACKUP_BEFORE_DEPLOY || '1' }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.STAGING_HOSTINGER_SSH_HOST }}
          username: ${{ secrets.STAGING_HOSTINGER_SSH_USER }}
          password: ${{ secrets.STAGING_VPS_SSH_PASSWORD }}
          port: 22
          command_timeout: 45m
          script_stop: true
          envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_PROJECT,DEPLOY_COMPOSE_FILE,DEPLOY_ENVIRONMENT,DEPLOY_GIT_SHA,APP_IMAGE,DB_USER,DB_PASSWORD,DB_NAME,V1_HTTP_PORT,GEMINI_API_KEY,SERVER_TYPE,MAIN_SERVER_URL,LOCAL_FACTORY_ID,SYNC_API_KEY,DB_BACKUP_BEFORE_DEPLOY,GHCR_PULL_TOKEN,GHCR_USERNAME,GITHUB_REPOSITORY
          script: |
            set -eo pipefail
            mkdir -p "$DEPLOY_PATH"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone "https://github.com/${GITHUB_REPOSITORY}.git" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            bash scripts/vps-safe-deploy.sh

      - name: Deploy staging over SSH (key)
        if: steps.gate.outputs.run == 'key'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.STAGING_VPS_DEPLOY_PATH }}
          DEPLOY_BRANCH: develop
          DEPLOY_PROJECT: jms-enterprise-v1-staging
          DEPLOY_COMPOSE_FILE: docker-compose.vps-v1-isolated.yml
          DEPLOY_ENVIRONMENT: staging
          DEPLOY_GIT_SHA: ${{ github.sha }}
          APP_IMAGE: ${{ needs.publish-image.outputs.image_ref }}
          DB_USER: jms_v1
          DB_PASSWORD: ${{ secrets.STAGING_VPS_POSTGRES_PASSWORD }}
          DB_NAME: jms_v1
          V1_HTTP_PORT: ${{ secrets.STAGING_V1_HTTP_PORT || '9092' }}
          GEMINI_API_KEY: ${{ secrets.STAGING_VPS_GEMINI_API_KEY }}
          SERVER_TYPE: MAIN
          MAIN_SERVER_URL: ${{ secrets.STAGING_MAIN_SERVER_URL }}
          LOCAL_FACTORY_ID: ${{ secrets.STAGING_LOCAL_FACTORY_ID }}
          SYNC_API_KEY: ${{ secrets.STAGING_SYNC_API_KEY }}
          DB_BACKUP_BEFORE_DEPLOY: ${{ secrets.STAGING_DB_BACKUP_BEFORE_DEPLOY || '1' }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.STAGING_HOSTINGER_SSH_HOST }}
          username: ${{ secrets.STAGING_HOSTINGER_SSH_USER }}
          key: ${{ secrets.STAGING_HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_HOSTINGER_SSH_KEY_PASSPHRASE }}
          port: 22
          command_timeout: 45m
          script_stop: true
          envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_PROJECT,DEPLOY_COMPOSE_FILE,DEPLOY_ENVIRONMENT,DEPLOY_GIT_SHA,APP_IMAGE,DB_USER,DB_PASSWORD,DB_NAME,V1_HTTP_PORT,GEMINI_API_KEY,SERVER_TYPE,MAIN_SERVER_URL,LOCAL_FACTORY_ID,SYNC_API_KEY,DB_BACKUP_BEFORE_DEPLOY,GHCR_PULL_TOKEN,GHCR_USERNAME,GITHUB_REPOSITORY
          script: |
            set -eo pipefail
            mkdir -p "$DEPLOY_PATH"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone "https://github.com/${GITHUB_REPOSITORY}.git" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            bash scripts/vps-safe-deploy.sh
