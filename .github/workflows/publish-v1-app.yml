# Builds BACKEND (JMS v1) and pushes to GHCR. Hostinger "Compose from URL" pulls this
# image only (no git build on the VPS).
#
# After the first successful run: GitHub → Packages → jms-v1-app → Package settings
# → set visibility to Public (otherwise the VPS cannot pull without docker login).

name: Publish JMS v1 app (GHCR)

on:
  push:
    branches: [main]
    paths:
      - "BACKEND/**"
      - ".github/workflows/publish-v1-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-jms-v1-app
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./BACKEND
          file: ./BACKEND/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/jms-v1-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
