name: JMS v1 - validate, publish, and deploy production

on:
  push:
    branches: [main]
    paths:
      - "BACKEND/**"
      - "docker-compose.vps-v1-isolated.yml"
      - "docker-compose.vps-v1-hostinger.yml"
      - "scripts/vps-safe-deploy.sh"
      - ".github/workflows/publish-v1-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: jms-v1-production
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/jms-v1-app

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jpsms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jpsms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BACKEND/package-lock.json

      - name: Install backend dependencies
        working-directory: BACKEND
        run: npm ci

      - name: Validate boot flow
        shell: bash
        working-directory: BACKEND
        run: |
          cat > .env <<'EOF'
          GEMINI_API_KEY=dummy-key
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_NAME=jpsms
          SERVER_TYPE=STANDALONE
          LOCAL_FACTORY_ID=1
          SYNC_API_KEY=production-ci
          EOF

          node scripts/wait-for-postgres.js
          node scripts/auto-import-db-if-needed.js

          node server.js > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/health >/tmp/health.json; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:3000/health
          curl -fsS http://127.0.0.1:3000/api/health

  publish-image:
    runs-on: ubuntu-latest
    needs: validate-backend
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          image_tag="sha-${short_sha}"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: ./BACKEND
          file: ./BACKEND/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  make-ghcr-public:
    runs-on: ubuntu-latest
    needs: publish-image
    steps:
      - name: Set container package visibility to public
        shell: bash
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set +e
          ok=0
          for apiurl in \
            "https://api.github.com/user/packages/container/jms-v1-app" \
            "https://api.github.com/orgs/${OWNER}/packages/container/jms-v1-app"; do
            resp=$(curl -sS -w "\n%{http_code}" -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TOKEN}" \
              "$apiurl" \
              -d '{"visibility":"public"}')
            code=$(echo "$resp" | tail -n1)
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then
              ok=1
              break
            fi
          done
          if [ "$ok" != "1" ]; then
            echo "::warning::Could not make GHCR public automatically. Set GHCR_PULL_TOKEN on the VPS deploy if needed."
          fi

  deploy-production:
    runs-on: ubuntu-latest
    needs: publish-image
    environment: production
    steps:
      - name: Check production deploy secrets
        id: gate
        shell: bash
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          USER: ${{ secrets.HOSTINGER_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DBPW: ${{ secrets.VPS_POSTGRES_PASSWORD }}
          SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$DEPLOY_PATH" ] || [ -z "$DBPW" ]; then
            echo "run=0" >> "$GITHUB_OUTPUT"
            echo "Skipping production deploy: set HOSTINGER_SSH_HOST, HOSTINGER_SSH_USER, VPS_DEPLOY_PATH, VPS_POSTGRES_PASSWORD."
            exit 0
          fi
          if [ -n "$SSH_PASSWORD" ]; then
            echo "run=password" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$SSH_KEY" ]; then
            echo "run=key" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run=0" >> "$GITHUB_OUTPUT"
          echo "Skipping production deploy: set VPS_SSH_PASSWORD or HOSTINGER_SSH_KEY."

      - name: Deploy production over SSH (password)
        if: steps.gate.outputs.run == 'password'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DEPLOY_BRANCH: main
          DEPLOY_PROJECT: jms-enterprise-v1
          DEPLOY_COMPOSE_FILE: docker-compose.vps-v1-isolated.yml
          DEPLOY_ENVIRONMENT: production
          DEPLOY_GIT_SHA: ${{ github.sha }}
          APP_IMAGE: ${{ needs.publish-image.outputs.image_ref }}
          DB_USER: jms_v1
          DB_PASSWORD: ${{ secrets.VPS_POSTGRES_PASSWORD }}
          DB_NAME: jms_v1
          V1_HTTP_PORT: ${{ secrets.V1_HTTP_PORT || '9091' }}
          GEMINI_API_KEY: ${{ secrets.VPS_GEMINI_API_KEY }}
          SERVER_TYPE: MAIN
          MAIN_SERVER_URL: ${{ secrets.MAIN_SERVER_URL }}
          LOCAL_FACTORY_ID: ${{ secrets.LOCAL_FACTORY_ID }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          DB_BACKUP_BEFORE_DEPLOY: ${{ secrets.DB_BACKUP_BEFORE_DEPLOY || '1' }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: 22
          command_timeout: 45m
          script_stop: true
          envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_PROJECT,DEPLOY_COMPOSE_FILE,DEPLOY_ENVIRONMENT,DEPLOY_GIT_SHA,APP_IMAGE,DB_USER,DB_PASSWORD,DB_NAME,V1_HTTP_PORT,GEMINI_API_KEY,SERVER_TYPE,MAIN_SERVER_URL,LOCAL_FACTORY_ID,SYNC_API_KEY,DB_BACKUP_BEFORE_DEPLOY,GHCR_PULL_TOKEN,GHCR_USERNAME,GITHUB_REPOSITORY
          script: |
            set -eo pipefail
            mkdir -p "$DEPLOY_PATH"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone "https://github.com/${GITHUB_REPOSITORY}.git" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            bash scripts/vps-safe-deploy.sh

      - name: Deploy production over SSH (key)
        if: steps.gate.outputs.run == 'key'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DEPLOY_BRANCH: main
          DEPLOY_PROJECT: jms-enterprise-v1
          DEPLOY_COMPOSE_FILE: docker-compose.vps-v1-isolated.yml
          DEPLOY_ENVIRONMENT: production
          DEPLOY_GIT_SHA: ${{ github.sha }}
          APP_IMAGE: ${{ needs.publish-image.outputs.image_ref }}
          DB_USER: jms_v1
          DB_PASSWORD: ${{ secrets.VPS_POSTGRES_PASSWORD }}
          DB_NAME: jms_v1
          V1_HTTP_PORT: ${{ secrets.V1_HTTP_PORT || '9091' }}
          GEMINI_API_KEY: ${{ secrets.VPS_GEMINI_API_KEY }}
          SERVER_TYPE: MAIN
          MAIN_SERVER_URL: ${{ secrets.MAIN_SERVER_URL }}
          LOCAL_FACTORY_ID: ${{ secrets.LOCAL_FACTORY_ID }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          DB_BACKUP_BEFORE_DEPLOY: ${{ secrets.DB_BACKUP_BEFORE_DEPLOY || '1' }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_KEY_PASSPHRASE }}
          port: 22
          command_timeout: 45m
          script_stop: true
          envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_PROJECT,DEPLOY_COMPOSE_FILE,DEPLOY_ENVIRONMENT,DEPLOY_GIT_SHA,APP_IMAGE,DB_USER,DB_PASSWORD,DB_NAME,V1_HTTP_PORT,GEMINI_API_KEY,SERVER_TYPE,MAIN_SERVER_URL,LOCAL_FACTORY_ID,SYNC_API_KEY,DB_BACKUP_BEFORE_DEPLOY,GHCR_PULL_TOKEN,GHCR_USERNAME,GITHUB_REPOSITORY
          script: |
            set -eo pipefail
            mkdir -p "$DEPLOY_PATH"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone "https://github.com/${GITHUB_REPOSITORY}.git" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            bash scripts/vps-safe-deploy.sh
