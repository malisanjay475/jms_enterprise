# VPS-only isolated stack: does not bind 80/443/3000/8080 by default.
# Uses its own project name, network, and named volumes so it never shares
# resources with jpsms, Traefik, or other compose projects on the same host.
#
# On the VPS (from a clone of this repo), create .env from env.vps-isolated.example
# then start with project name jms-enterprise-vps (any unique name is fine).

name: jms-enterprise-vps

# Inline config avoids broken host bind-mounts on managed paths (e.g. Hostinger /docker/...).
configs:
  jms_vps_nginx:
    content: |
      server {
          listen 80;
          server_name _;

          location /api/ {
              proxy_pass http://api:3000/api/;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }

          location /socket.io/ {
              proxy_pass http://api:3000/socket.io/;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
          }

          location / {
              proxy_pass http://web:3000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jms
      # Defaults allow Hostinger/MCP deploy without a host .env; override in production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-JmsVpsDbAuto9x4k2m7n1q5w8r}
      POSTGRES_DB: jms
    volumes:
      - jms_vps_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jms -d jms"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [jms_vps]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jms_vps_redis_data:/data
    networks: [jms_vps]

  api:
    build:
      context: ./v2-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://jms:${POSTGRES_PASSWORD:-JmsVpsDbAuto9x4k2m7n1q5w8r}@db:5432/jms
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-JmsVpsJwtAutoSecretKey32charsMinimum!!}
    networks: [jms_vps]

  web:
    build:
      context: ./v2-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    networks: [jms_vps]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_HOST_PORT:-9080}:80"
    configs:
      - source: jms_vps_nginx
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - web
    networks: [jms_vps]

networks:
  jms_vps:
    name: jms_enterprise_vps_net

volumes:
  jms_vps_pg_data:
    name: jms_enterprise_vps_pgdata
  jms_vps_redis_data:
    name: jms_enterprise_vps_redisdata
