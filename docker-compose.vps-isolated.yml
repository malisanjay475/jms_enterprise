# VPS-only isolated stack: does not bind 80/443/3000/8080 by default.
# Uses its own project name, network, and named volumes so it never shares
# resources with jpsms, Traefik, or other compose projects on the same host.
#
# On the VPS (from a clone of this repo), create .env from env.vps-isolated.example
# then start with project name jms-enterprise-vps (any unique name is fine).

name: jms-enterprise-vps

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: jms
    volumes:
      - jms_vps_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jms -d jms"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [jms_vps]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jms_vps_redis_data:/data
    networks: [jms_vps]

  api:
    build:
      context: ./v2-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://jms:${POSTGRES_PASSWORD}@db:5432/jms
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 characters)}
    networks: [jms_vps]

  web:
    build:
      context: ./v2-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    networks: [jms_vps]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_HOST_PORT:-9080}:80"
    volumes:
      - ./deploy/docker/v2-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks: [jms_vps]

networks:
  jms_vps:
    name: jms_enterprise_vps_net

volumes:
  jms_vps_pg_data:
    name: jms_enterprise_vps_pgdata
  jms_vps_redis_data:
    name: jms_enterprise_vps_redisdata
