# VPS-only isolated stack: does not bind 80/443/3000/8080 by default.
# Own network + named volumes so it does not share resources with jpsms/Traefik.
#
# Compose 3.8 + list-only depends_on: Hostinger Docker Manager validates strictly.
# Use: docker compose -p jms-enterprise-vps -f docker-compose.vps-isolated.yml up -d --build

version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-JmsVpsDbAuto9x4k2m7n1q5w8r}
      POSTGRES_DB: jms
    volumes:
      - jms_vps_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jms -d jms"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [jms_vps]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jms_vps_redis_data:/data
    networks: [jms_vps]

  api:
    build:
      context: ./v2-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://jms:${POSTGRES_PASSWORD:-JmsVpsDbAuto9x4k2m7n1q5w8r}@db:5432/jms
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-JmsVpsJwtAutoSecretKey32charsMinimumXx}
    networks: [jms_vps]

  web:
    build:
      context: ./v2-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    networks: [jms_vps]

  nginx:
    build:
      context: ./deploy/docker
      dockerfile: Dockerfile.vps-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_HOST_PORT:-9080}:80"
    depends_on:
      - api
      - web
    networks: [jms_vps]

networks:
  jms_vps:
    name: jms_enterprise_vps_net

volumes:
  jms_vps_pg_data:
    name: jms_enterprise_vps_pgdata
  jms_vps_redis_data:
    name: jms_enterprise_vps_redisdata
