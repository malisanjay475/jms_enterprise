services:
  # Application Service
  app:
    build: .
    container_name: jms-v1-local-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - AUTO_IMPORT_DB_PATH=${AUTO_IMPORT_DB_PATH:-}
      - AUTO_IMPORT_DB_FORCE=${AUTO_IMPORT_DB_FORCE:-0}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SERVER_TYPE=${SERVER_TYPE} # MAIN or LOCAL
      - MAIN_SERVER_URL=${MAIN_SERVER_URL}
      - LOCAL_FACTORY_ID=${LOCAL_FACTORY_ID}
      - SYNC_API_KEY=${SYNC_API_KEY}
    volumes:
      - ../seed:/seed:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jms-v1-local-net

  # Database Service
  db:
    image: postgres:14-alpine
    container_name: jms-v1-local-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Optional init script
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - jms-v1-local-net

  # Nginx Reverse Proxy (Optional, good for SSL)
  nginx:
    image: nginx:alpine
    container_name: jpsms-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - jms-v1-local-net

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - jms-v1-local-net

networks:
  jms-v1-local-net:


volumes:
  postgres_data:
