# Hostinger Docker Manager — "Compose from URL" (only this file exists on the VPS).
# Builds pull source from GitHub; keep fragment URLs quoted (# is YAML comment otherwise).
#
# Paste this raw URL in hPanel:
# https://raw.githubusercontent.com/malisanjay475/jms_enterprise/main/docker-compose.vps-hostinger.yml

version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-JmsVpsDbAuto9x4k2m7n1q5w8r}
      POSTGRES_DB: jms
    volumes:
      - jms_vps_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jms -d jms"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [jms_vps]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jms_vps_redis_data:/data
    networks: [jms_vps]

  api:
    build:
      context: "https://github.com/malisanjay475/jms_enterprise.git#main:v2-backend"
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://jms:${POSTGRES_PASSWORD:-JmsVpsDbAuto9x4k2m7n1q5w8r}@db:5432/jms
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-JmsVpsJwtAutoSecretKey32charsMinimumXx}
    networks: [jms_vps]

  web:
    build:
      context: "https://github.com/malisanjay475/jms_enterprise.git#main:v2-frontend"
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    networks: [jms_vps]

  nginx:
    build:
      context: "https://github.com/malisanjay475/jms_enterprise.git#main:deploy/docker"
      dockerfile: Dockerfile.vps-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_HOST_PORT:-9080}:80"
    depends_on:
      - api
      - web
    networks: [jms_vps]

networks:
  jms_vps:
    name: jms_enterprise_vps_net

volumes:
  jms_vps_pg_data:
    name: jms_enterprise_vps_pgdata
  jms_vps_redis_data:
    name: jms_enterprise_vps_redisdata
